name: Sync Board from Code Comments

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.rs'

permissions:
  contents: write
  issues: write

jobs:
  sync-board:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract In Progress and Done from files
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          echo "Extracting status from Rust files..."
          {
            echo "## Status Update from Code - $(date)"
            echo
          } > status.md

          mapfile -t files < <(find src -type f -name '*.rs' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Rust files found under src/." >> status.md
          fi

          for file in "${files[@]}"; do
            {
              echo "### $file"
              echo
              sed -n '/=== IN PROGRESS ===/,/=== DONE ===/p' "$file" | sed '/=== DONE ===/q' || true
              echo
              sed -n '/=== DONE ===/,$p' "$file" || true
              echo
            } >> status.md
          done

          cat status.md

      - name: Create issues and write issue numbers back into Rust files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const files = execSync(`git ls-files "src/**/*.rs" "src/*.rs"`, { encoding: 'utf8' })
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            async function findIssueByStableId(stableId) {
              const safe = stableId.replace(/"/g, '\\"');
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue "Stable ID: ${safe}" label:automated`;
              const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
              return res.data.items.find(i => !i.pull_request) || null;
            }

            for (const file of files) {
              let content = fs.readFileSync(file, 'utf8');
              const lines = content.split('\n');
              let changed = false;
              let inProgress = false;

              for (let i = 0; i < lines.length; i++) {
                const raw = lines[i];
                const trimmed = raw.trim();

                if (trimmed.includes('=== IN PROGRESS ===')) {
                  inProgress = true;
                  continue;
                }
                if (trimmed.includes('=== DONE ===')) {
                  inProgress = false;
                  continue;
                }

                if (!inProgress) continue;

                // Match: // - [ISSUE:xxx] Title here
                const match = raw.match(/^(\s*\/\/\s*[-*]\s+)(#(\d+)\s+)?(\[ISSUE:([^\]]+)\]\s+)(.+)\s*$/);
                if (!match) continue;

                const prefix = match[1];
                const existingNumber = match[3];
                const stableId = `[ISSUE:${match[5]}]`;
                const title = match[6].trim();

                if (existingNumber) continue;

                let issue = await findIssueByStableId(stableId);
                let issueNumber;

                if (!issue) {
                  const body = `Stable ID: ${stableId}\nSource: \`${file}\`\n\n(Generated automatically from IN PROGRESS comments.)`;
                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: body,
                    labels: ['automated', 'in-progress']
                  });
                  issueNumber = created.data.number;
                  console.log(`Created issue #${issueNumber} for ${stableId}`);
                } else {
                  issueNumber = issue.number;
                  console.log(`Found existing issue #${issueNumber} for ${stableId}`);
                }

                lines[i] = `${prefix}#${issueNumber} ${stableId} ${title}`;
                changed = true;
              }

              if (changed) {
                fs.writeFileSync(file, lines.join('\n'), 'utf8');
                console.log(`Updated file: ${file}`);
              }
            }

      - name: Commit and push updated issue numbers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Sync issue numbers into IN PROGRESS comments [skip ci]" || exit 0
          git push
