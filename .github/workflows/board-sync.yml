name: Sync Board from Code Comments

on:
  push:
    branches: [ main ]
    paths:
      - "src/**/*.rs"

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-board:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract In Progress and Done from files
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          echo "Extracting status from Rust files..."
          {
            echo "## Status Update from Code - $(date)"
            echo
          } > status.md

          mapfile -t files < <(find src -type f -name '*.rs' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Rust files found under src/." >> status.md
          fi

          for file in "${files[@]}"; do
            {
              echo "### $file"
              echo
              # IN PROGRESS section - stop cleanly BEFORE the DONE marker
              sed -n '/=== IN PROGRESS ===/,/=== DONE ===/p' "$file" | sed '$d' || true
              echo
              # DONE section
              sed -n '/=== DONE ===/,$p' "$file" || true
              echo
            } >> status.md
          done

          cat status.md

      - name: Create/update issues, write numbers back, and sync to Project board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const projectOwnerLogin = "hmrdsmoke";
            const projectNumber = 3;
            const STATUS_FIELD_NAME = "Status";
            const STATUS_IN_PROGRESS = "In Progress";
            const STATUS_DONE = "Done";
            const LABEL_AUTOMATED = "automated";
            const LABEL_IN_PROGRESS = "in-progress";
            const NON_FATAL_PROJECT_SYNC = true;

            async function getProjectMetaOrNull() {
              try {
                const data = await github.graphql(`
                  query($login:String!, $number:Int!) {
                    user(login:$login) {
                      projectV2(number:$number) {
                        id
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options { id name }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { login: projectOwnerLogin, number: projectNumber });

                const project = data?.user?.projectV2;
                if (!project) throw new Error("Project not found");

                const statusField = (project.fields?.nodes || []).find(f => f && f.name === STATUS_FIELD_NAME);
                if (!statusField) throw new Error(`Field "${STATUS_FIELD_NAME}" not found`);

                const inProgressOpt = (statusField.options || []).find(o => o.name === STATUS_IN_PROGRESS);
                const doneOpt = (statusField.options || []).find(o => o.name === STATUS_DONE);

                return {
                  projectId: project.id,
                  statusFieldId: statusField.id,
                  inProgressOptId: inProgressOpt?.id,
                  doneOptId: doneOpt?.id,
                };
              } catch (e) {
                if (!NON_FATAL_PROJECT_SYNC) throw e;
                console.warn(`[Project sync skipped]: ${e.message}`);
                return null;
              }
            }

            async function findIssueByStableId(stableId) {
              const safe = stableId.replace(/"/g, '\\"');
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue "Stable ID: ${safe}" label:${LABEL_AUTOMATED}`;
              const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
              return res.data.items.find(i => !i.pull_request) || null;
            }

            const projectMeta = await getProjectMetaOrNull();

            const files = execSync(`git ls-files "src/**/*.rs" "src/*.rs"`, { encoding: 'utf8' })
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            for (const file of files) {
              let content = fs.readFileSync(file, 'utf8');
              const lines = content.split('\n');
              let changed = false;
              let inProgress = false;

              for (let i = 0; i < lines.length; i++) {
                const raw = lines[i];
                const trimmed = raw.trim();

                if (trimmed.includes('=== IN PROGRESS ===')) {
                  inProgress = true;
                  continue;
                }
                if (trimmed.includes('=== DONE ===')) {
                  inProgress = false;
                  continue;
                }

                if (!inProgress) continue;

                const match = raw.match(/^(\s*\/\/\s*[-*]\s+)(#(\d+)\s+)?(\[ISSUE:([^\]]+)\]\s+)(.+)\s*$/);
                if (!match) continue;

                const prefix = match[1];
                const existingNumber = match[3];
                const stableId = `[ISSUE:${match[5]}]`;
                const title = match[6].trim();

                if (existingNumber) continue;

                let issue = await findIssueByStableId(stableId);
                let issueNumber;

                if (!issue) {
                  const body = `Stable ID: ${stableId}\nSource: \`${file}\`\n\n(Generated automatically from IN PROGRESS comments.)`;
                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: body,
                    labels: [LABEL_AUTOMATED, LABEL_IN_PROGRESS]
                  });
                  issueNumber = created.data.number;
                  console.log(`Created issue #${issueNumber} for ${stableId}`);
                } else {
                  issueNumber = issue.number;
                  console.log(`Found existing issue #${issueNumber} for ${stableId}`);
                }

                lines[i] = `${prefix}#${issueNumber} ${stableId} ${title}`;
                changed = true;
              }

              if (changed) {
                fs.writeFileSync(file, lines.join('\n'), 'utf8');
                console.log(`Updated file: ${file}`);
              }
            }

            - name: Commit and push updated issue numbers
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only tracked Rust files (doesn't error if none match)
          mapfile -t rs_files < <(git ls-files -- 'src/**/*.rs' 'src/*.rs' || true)

          if [ "${#rs_files[@]}" -eq 0 ]; then
            echo "No Rust files found to stage."
            exit 0
          fi

          git add -- "${rs_files[@]}"

          # Only commit if Rust files actually changed (ignores status.md)
          if git diff --cached --quiet; then
            echo "No Rust changes to commit."
            exit 0
          fi

          git commit -m "chore: sync issue numbers from code comments [skip ci]"
          git push