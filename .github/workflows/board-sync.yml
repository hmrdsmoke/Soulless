name: Sync Board from Code Comments

on:
  push:
    branches: [ main ]
    paths:
      - "src/**/*.rs"

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-board:
    # prevents infinite loop when the workflow commits back to main
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract In Progress and Done from files
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          echo "Extracting status from Rust files..."
          {
            echo "## Status Update from Code - $(date)"
            echo
          } > status.md

          mapfile -t files < <(find src -type f -name '*.rs' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Rust files found under src/." >> status.md
          fi

          for file in "${files[@]}"; do
            {
              echo "### $file"
              echo
              # IN PROGRESS section without duplicating the DONE marker
              sed -n '/=== IN PROGRESS ===/,/=== DONE ===/p' "$file" | sed '$d' || true
              echo
              # DONE section
              sed -n '/=== DONE ===/,$p' "$file" || true
              echo
            } >> status.md
          done

          cat status.md

      - name: Create/update issues, write numbers back, and sync to Project board
        uses: actions/github-script@v7
        with:
          # IMPORTANT:
          # Use a classic PAT with `project` scope (and usually `repo` scope) because this is a USER Project v2:
          # https://github.com/users/hmrdsmoke/projects/3/views/2
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // --- Project configuration (Projects v2) ---
            const projectOwnerLogin = "hmrdsmoke";
            const projectNumber = 3;

            // Confirmed by you:
            // field: Status
            // option: Done
            // (Also requires the option "In Progress" to exist)
            const STATUS_FIELD_NAME = "Status";
            const STATUS_IN_PROGRESS = "In Progress";
            const STATUS_DONE = "Done";

            async function getProjectMeta() {
              const data = await github.graphql(`
                query($login:String!, $number:Int!) {
                  user(login:$login) {
                    projectV2(number:$number) {
                      id
                      fields(first:50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              `, { login: projectOwnerLogin, number: projectNumber });

              const project = data.user.projectV2;
              const statusField = project.fields.nodes.find(f => f && f.name === STATUS_FIELD_NAME);
              if (!statusField) throw new Error(`Project field "${STATUS_FIELD_NAME}" not found`);

              const inProgressOpt = statusField.options.find(o => o.name === STATUS_IN_PROGRESS);
              if (!inProgressOpt) throw new Error(`Status option "${STATUS_IN_PROGRESS}" not found`);

              const doneOpt = statusField.options.find(o => o.name === STATUS_DONE);
              if (!doneOpt) throw new Error(`Status option "${STATUS_DONE}" not found`);

              return {
                projectId: project.id,
                statusFieldId: statusField.id,
                inProgressOptId: inProgressOpt.id,
                doneOptId: doneOpt.id
              };
            }

            const projectMeta = await getProjectMeta();

            // Try to add issue to project; if already exists, locate existing item id
            async function getOrCreateProjectItemId(contentNodeId) {
              try {
                const added = await github.graphql(`
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input:{ projectId:$projectId, contentId:$contentId }) {
                      item { id }
                    }
                  }
                `, { projectId: projectMeta.projectId, contentId: contentNodeId });

                return added.addProjectV2ItemById.item.id;
              } catch (e) {
                // If already added, find it (first 100 items)
                const existing = await github.graphql(`
                  query($projectId:ID!) {
                    node(id:$projectId) {
                      ... on ProjectV2 {
                        items(first:100) {
                          nodes {
                            id
                            content { ... on Issue { id } }
                          }
                        }
                      }
                    }
                  }
                `, { projectId: projectMeta.projectId });

                const nodes = existing.node.items.nodes || [];
                const match = nodes.find(n => n.content && n.content.id === contentNodeId);
                if (!match) throw e;
                return match.id;
              }
            }

            async function setProjectStatus(itemId, optionId) {
              await github.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: projectMeta.projectId,
                itemId,
                fieldId: projectMeta.statusFieldId,
                optionId
              });
            }

            async function addToProjectAndSetStatus(contentNodeId, optionId) {
              const itemId = await getOrCreateProjectItemId(contentNodeId);
              await setProjectStatus(itemId, optionId);
            }

            // --- Repo file discovery ---
            const files = execSync(`git ls-files "src/**/*.rs" "src/*.rs"`, { encoding: 'utf8' })
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            async function findIssueByStableId(stableId) {
              const safe = stableId.replace(/"/g, '\\"');
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue "Stable ID: ${safe}" label:automated`;
              const res = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
              return res.data.items.find(i => !i.pull_request) || null;
            }

            function parseTaskLine(raw) {
              // Match: // - [ISSUE:xxx] Title here
              const match = raw.match(/^(\s*\/\/\s*[-*]\s+)(#(\d+)\s+)?(\[ISSUE:([^\]]+)\]\s+)(.+)\s*$/);
              if (!match) return null;
              return {
                prefix: match[1],
                existingNumber: match[3] || null,
                stableId: `[ISSUE:${match[5]}]`,
                title: match[6].trim(),
              };
            }

            for (const file of files) {
              let content = fs.readFileSync(file, 'utf8');
              const lines = content.split('\n');
              let changed = false;

              let section = null; // 'in-progress' | 'done' | null

              for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();

                if (trimmed.includes('=== IN PROGRESS ===')) { section = 'in-progress'; continue; }
                if (trimmed.includes('=== DONE ===')) { section = 'done'; continue; }
                if (!section) continue;

                const parsed = parseTaskLine(lines[i]);
                if (!parsed) continue;

                if (section === 'done') {
                  // Move existing automated issues to Done (does not create new issues for Done items)
                  const issue = await findIssueByStableId(parsed.stableId);
                  if (issue) {
                    await addToProjectAndSetStatus(issue.node_id, projectMeta.doneOptId);
                    console.log(`Moved ${parsed.stableId} -> Status=Done (issue #${issue.number})`);
                  }
                  continue;
                }

                // section === 'in-progress'
                let issue = await findIssueByStableId(parsed.stableId);
                let issueNumber;

                if (!issue) {
                  const body = `Stable ID: ${parsed.stableId}\nSource: \`${file}\`\n\n(Generated automatically from IN PROGRESS comments.)`;
                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: parsed.title,
                    body,
                    labels: ['automated', 'in-progress']
                  });
                  issue = created.data;
                  issueNumber = issue.number;
                  console.log(`Created issue #${issueNumber} for ${parsed.stableId}`);
                } else {
                  issueNumber = issue.number;
                  console.log(`Found existing issue #${issueNumber} for ${parsed.stableId}`);
                }

                await addToProjectAndSetStatus(issue.node_id, projectMeta.inProgressOptId);

                // Write back #number if missing
                if (!parsed.existingNumber) {
                  lines[i] = `${parsed.prefix}#${issueNumber} ${parsed.stableId} ${parsed.title}`;
                  changed = true;
                }
              }

              if (changed) {
                fs.writeFileSync(file, lines.join('\n'), 'utf8');
                console.log(`Updated file: ${file}`);
              }
            }

      - name: Commit and push updated issue numbers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "Sync issue numbers into IN PROGRESS comments [skip ci]" || exit 0
          git push